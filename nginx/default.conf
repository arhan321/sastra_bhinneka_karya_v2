server {
    listen 80;
    index index.php index.html;

    server_name sastrabhinnekakarya.co.id www.sastrabhinnekakarya.co.id;

    root /var/www/html/public;

    server_tokens off;

    error_log /var/log/nginx/sastra.error.log warn;
    access_log /var/log/nginx/sastra.access.log;

    client_max_body_size 3072M;
    client_body_timeout 300s;
    client_header_timeout 30s;
    send_timeout 30s;

    sendfile on;
    tcp_nopush on;
    tcp_nodelay on;

    keepalive_timeout 15;
    keepalive_requests 1000;

    gzip on;
    gzip_vary on;
    gzip_comp_level 5;
    gzip_min_length 1024;
    gzip_proxied any;
    gzip_types
        text/plain
        text/css
        text/xml
        application/json
        application/javascript
        application/xml
        application/xml+rss
        image/svg+xml;

    if ($http_x_forwarded_proto = "http") {
        return 301 https://sastrabhinnekakarya.co.id$request_uri;
    }

    if ($host = "www.sastrabhinnekakarya.co.id") {
        return 301 https://sastrabhinnekakarya.co.id$request_uri;
    }

    location / {
        try_files $uri $uri/ /index.php?$query_string;
        add_header Access-Control-Allow-Origin * always;
    }

    # PENTING: Livewire route harus masuk Laravel, bukan dianggap file static
    location ~ ^/livewire(-[A-Za-z0-9]+)?/ {
        try_files $uri /index.php?$query_string;
    }

    location ~ \.php$ {
        try_files $uri =404;

        fastcgi_split_path_info ^(.+\.php)(/.+)$;
        fastcgi_pass php_sastra:9000;
        fastcgi_index index.php;

        include fastcgi_params;

        fastcgi_param SCRIPT_FILENAME $document_root$fastcgi_script_name;

        fastcgi_param HTTPS on;
        fastcgi_param HTTP_X_FORWARDED_PROTO https;
        fastcgi_param HTTP_X_FORWARDED_SSL on;

        fastcgi_pass_request_headers on;

        fastcgi_buffering on;
        fastcgi_buffer_size 32k;
        fastcgi_buffers 16 16k;
        fastcgi_busy_buffers_size 64k;
        fastcgi_temp_file_write_size 64k;

        fastcgi_connect_timeout 60s;
        fastcgi_send_timeout 300s;
        fastcgi_read_timeout 300s;
    }

    location ~* \.(?:jpg|jpeg|png|gif|webp|avif|svg|ico|css|js|woff|woff2|ttf|eot)$ {
        expires 30d;
        add_header Cache-Control "public, max-age=2592000, immutable";
        access_log off;
        try_files $uri =404;
    }

    location ~ /\.(?!well-known).* {
        deny all;
    }
}